name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync
        env:
          # CI runs outside mainland China — use upstream PyPI instead of
          # the Tsinghua mirror that pyproject.toml declares as default.
          UV_DEFAULT_INDEX: https://pypi.org/simple

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest -q
